          cn: "这是在喵喵机发明之前进行的一项热敏打印实验。设备可即时打印照片，并附带原图二维码，便于与街头偶遇的人分享。"
        alt:
          en: "An experiment with thermal printer, printing a photo in black and white."
          cn: "使用热敏打印机输出黑白照片的实验。"

