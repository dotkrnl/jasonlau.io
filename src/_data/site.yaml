publications:
  - pdf: "research-papers/10.1109-ICCAD66269.2025.11240757.pdf"
    translationPdf: "research-papers/10.1109-ICCAD66269.2025.11240757-cn.pdf"
    titleStart:
      en: "Automated Design Space Exploration in High-Level Physical"
      cn: "面向高层次物理综合的自动化设计空间"
    titleEnd:
      en: "Synthesis"
      cn: "探索"
    authors: 'Linfeng Du, Jiawei Liang, <span class="font-bold text-black">Jason Lau</span>, Yuze Chi, Yutong Xie, Chunyou Su, Afzal Ahmad, Zifan He, Jake Ke, Jinming Ge, Jason Cong, Wei Zhang, Licheng Guo'
    venue:
      en: "ICCAD '25 - The 2025 IEEE/ACM International Conference On Computer Aided Design"
      cn: "ICCAD '25（国际计算机辅助设计会议）"
    year: "2025"
    abstract:
      en: "We propose a robust Design Space Exploration (DSE) framework to address the instability and manual complexity of existing High-Level Physical Synthesis (HLPS) for multi-die FPGAs. By automating iterative parameter tuning through physical implementation metrics and tailored heuristics, our framework ensures consistent timing closure and eliminates user intervention. In evaluations on large-scale designs, the framework achieved an average frequency of 311.06 MHz, outperforming the AMD Vitis/Vivado toolchain by 2.42× and leading academic solutions by 1.67×."
      cn: "本文提出一套稳健的设计空间探索（DSE）框架，以解决现有面向多芯粒 FPGA 的高层次物理综合（HLPS）在稳定性不足与人工调参复杂方面的问题。该框架基于物理实现指标与定制启发式策略实现迭代参数自动优化，从而稳定实现时序收敛并消除人工调参的需求。在大规模设计评估中，框架取得了 311.06 MHz 的平均频率，性能较 AMD Vitis/Vivado 工具链提升 2.42 倍，较现有学术方案提升 1.67 倍。"
  - pdf: "research-papers/10.1145-3676536.3676649.pdf"
    translationPdf: "research-papers/10.1145-3676536.3676649-cn.pdf"
    titleStart:
      en: "RapidStream IR: Infrastructure for FPGA High-Level Physical"
      cn: "RapidStream IR：面向 FPGA 高层次物理综合的基础"
    titleEnd:
      en: "Synthesis"
      cn: "设施"
    authors: '<span class="font-bold text-black">Jason Lau</span>, Yuanlong Xiao, Yutong Xie, Yuze Chi, Linghao Song, Shaojie Xiang, Michael Lo, Zhiru Zhang, Jason Cong, Licheng Guo'
    venue:
      en: "ICCAD '24 - The 43rd IEEE/ACM International Conference on Computer-Aided Design"
      cn: "ICCAD '24（国际计算机辅助设计会议）"
    year: "2024"
    abstract:
      en: "We present the concept of high-level physical synthesis (HLPS), and a practical infrastructure for representing the composition of complex FPGA designs and exploring physical optimizations. Our approach introduces a flexible intermediate representation that captures interconnection protocols at arbitrary hierarchical levels, coarse-grained pipelining, and spatial information, enabling the creation of reusable passes for design frequency optimizations. RapidStream IR improves the frequency of a broad set of mixed-source designs by 7% to 62%."
      cn: "本文提出高层次物理综合（HLPS）的概念，并构建了一套面向复杂 FPGA 设计组合表达与物理优化探索的实用基础设施。该方法引入了灵活的中间表示，可在任意层级捕捉互连协议、粗粒度流水线以及空间信息，从而支持可复用的频率优化流程。RapidStream IR 在多类 HLS / RTL / IP 混合设计上带来了 7% 至 62% 的频率提升。"
  - pdf: "research-papers/10.1145-3686163.pdf"
    titleStart:
      en: "CHARM 2.0: Composing Heterogeneous Accelerators for Deep Learning on Versal ACAP"
      cn: "CHARM 2.0：面向 Versal ACAP 深度学习的异构加速器"
    titleEnd:
      en: "Architecture"
      cn: "架构"
    authors: 'Jinming Zhuang, <span class="font-bold text-black">Jason Lau</span>, Hanchen Ye, Zhuoping Yang, Shixin Ji, Jack Lo, Kristof Denolf, Stephen Neuendorffer, Alex Jones, Jingtong Hu, Yiyu Shi, Deming Chen, Jason Cong, Peipei Zhou'
    venue:
      en: 'TRETS ''24 - ACM Transactions on Reconfigurable Technology and Systems, Volume 17, Issue 3, Article No. 51<span class="pub-pages">, Pages 1 - 31</span>'
      cn: 'TRETS ''24（ACM 可重构技术与系统汇刊），第 17 卷第 3 期，第 51 篇<span class="pub-pages">，第 1 - 31 页</span>'
    cvYear: "2024"
    abstract:
      en: "We propose CHARM, a framework designed to optimize throughput for end-to-end deep learning applications on the AMD/Xilinx Versal ACAP. To overcome the performance bottlenecks caused by executing small matrix multiply (MM) layers on monolithic accelerators, CHARM composes multiple diverse, concurrent accelerator architectures tailored to varied layer sizes. By utilizing analytical models for design space exploration and automated code generation, CHARM achieves throughput gains of up to 32.51x over monolithic designs across models like BERT and ViT."
      cn: "本文提出 CHARM 框架，用于优化 AMD/Xilinx Versal ACAP 上端到端深度学习应用的吞吐性能。针对单体加速器在执行小规模矩阵乘法层时面临的性能瓶颈，CHARM 根据不同层规模组合多种可并发执行的异构加速架构。借助分析模型进行设计空间探索与自动代码生成，CHARM 在 BERT、ViT 等模型上相较单体设计实现了最高 32.51 倍的吞吐提升。"
  - pdf: "research-papers/thesis.pdf"
    titleStart:
      en: "Enabling Heterogeneous Computing for Software"
      cn: "面向软件开发者的异构计算"
    titleEnd:
      en: "Developers"
      cn: "系统"
    authors: '<span class="font-bold text-black">Jason Lau</span> advised by Jason Cong'
    venue:
      en: "Ph.D. Dissertation, University of California, Los Angeles"
      cn: "加州大学洛杉矶分校博士学位论文"
    cvYear: "2024"
    abstract:
      en: "We introduce Heterosys, an end-to-end framework designed to bridge the gap between high-level software and efficient FPGA implementation. By decoupling algorithmic descriptions from underlying hardware, Heterosys utilizes three core components—HeteroRefactor for automated refactoring and selective offloading, Adroit for frequency-driven architectural optimization, and RapidIR for high-level physical synthesis and floorplanning. Our research demonstrates frequency improvements of 30% to over 100%, resource reductions up to 90%, and a 51% decrease in manual code effort, significantly lowering the barrier to entry for heterogeneous computing."
      cn: "本文提出 Heterosys，一套旨在弥合高层软件与高效 FPGA 实现之间鸿沟的端到端框架。通过将算法描述与底层硬件解耦，Heterosys 集成了三个核心组件：用于自动重构与选择性交由 CPU 执行的 HeteroRefactor、用于频率驱动架构优化的 Adroit，以及用于高层次物理综合与布局规划的 RapidIR。研究结果表明，该体系可带来 30% 至超过 100% 的频率提升、最高 90% 的资源节省，并将人工代码工作量降低 51%，显著降低异构计算的使用门槛。"
  - pdf: "research-papers/10.1145-3609335.pdf"
    titleStart:
      en: "TAPA: A Scalable Task-Parallel Dataflow Programming Framework for Modern FPGAs with Co-Optimization of HLS and Physical"
      cn: "TAPA：面向现代 FPGA 的可扩展任务并行数据流及高层次综合与物理结构协同优化的编程"
    titleEnd:
      en: "Design"
      cn: "框架"
    authors: '<span class="underline">{Licheng Guo*, Yuze Chi*, <span class="font-bold text-black">Jason Lau*</span>}</span>, Linghao Song, Xingyu Tian, Moazin Khatti, Weikang Qiao, Jie Wang, Ecenur Ustun, Zhenman Fang, Zhiru Zhang, Jason Cong'
    venue:
      en: 'TRETS ''23 - ACM Transactions on Reconfigurable Technology and Systems, Volume 16, Issue 4, Article No. 63<span class="pub-pages">, Pages 1 - 31</span>'
      cn: 'TRETS ''23（ACM 可重构技术与系统汇刊），第 16 卷第 4 期，第 63 篇<span class="pub-pages">，第 1 - 31 页</span>'
    year: "2023"
    abstract:
      en: "We propose TAPA, an end-to-end framework for compiling C++ task-parallel programs into high-frequency FPGA accelerators. By utilizing flexible communication APIs and coarse-grained floorplanning during compilation, TAPA enables accurate pipelining of critical paths and optimizes designs for HBM-based FPGAs. Experimental results across 43 designs demonstrate a 102% average frequency improvement, including successful implementation of previously unroutable designs with minimal resource impact."
      cn: "本文提出 TAPA，一套将 C++ 任务并行程序编译为高频 FPGA 加速器的端到端框架。通过在编译过程中引入灵活的通信 API 与粗粒度布局规划，TAPA 能够对关键路径进行精确流水化，并针对基于 HBM 的 FPGA 进行优化。在 43 个设计上的实验表明，TAPA 平均带来了 102% 的频率提升，并以极小资源代价成功实现了此前无法布线的设计。"
    badges:
      - en: "Cited 50+ times"
        cn: "引用 50+ 次"
  - pdf: "research-papers/10.1145-3593025.pdf"
    titleStart:
      en: "RapidStream 2.0: Automated Parallel Implementation of Latency–Insensitive FPGA Designs Through Partial"
      cn: "RapidStream 2.0：通过部分重构实现时延无关 FPGA 设计的自动化并行布局"
    titleEnd:
      en: "Reconfiguration"
      cn: "布线"
    authors: 'Licheng Guo, Pongstorn Maidee, Yun Zhou, Chris Lavin, Eddie Hung, Wuxi Li, <span class="font-bold text-black">Jason Lau</span>, Weikang Qiao, Yuze Chi, Linghao Song, Yuanlong Xiao, Alireza Kaviani, Zhiru Zhang, Jason Cong'
    venue:
      en: 'TRETS ''23 - ACM Transactions on Reconfigurable Technology and Systems, Volume 16, Issue 4, Article No. 59<span class="pub-pages">, Pages 1 - 30</span>'
      cn: 'TRETS ''23（ACM 可重构技术与系统汇刊），第 16 卷第 4 期，第 59 篇<span class="pub-pages">，第 1 - 30 页</span>'
    cvYear: "2023"
    abstract:
      en: "We present RapidStream, a parallelized, physical-integrated compilation framework designed to drastically reduce FPGA compilation cycles. By co-optimizing HLS with back-end physical implementation, RapidStream partitions latency-insensitive C/C++ programs for parallel placement and routing. RapidStream achieves a 5–7× reduction in compile time and up to a 1.3× increase in frequency compared to commercial toolchains."
      cn: "本文提出 RapidStream，一套并行化、物理感知的一体化编译框架，旨在显著缩短 FPGA 编译周期。通过联合优化高层次综合与后端物理实现，RapidStream 将时延无关的 C/C++ 程序划分为可并行布局布线的子模块。与商业工具链相比，RapidStream 可将编译时间缩短 5 至 7 倍，并实现最高 1.3 倍的频率提升。"
  - pdf: "research-papers/10.1145-3543622.3573210.pdf"
    titleStart:
      en: "CHARM: Composing Heterogeneous Accelerators for Matrix Multiply on Versal ACAP"
      cn: "CHARM：面向 Versal ACAP 矩阵乘法的异构加速器"
    titleEnd:
      en: "Architecture"
      cn: "架构"
    authors: 'Jinming Zhuang, <span class="font-bold text-black">Jason Lau</span>, Hanchen Ye, Zhuoping Yang, Yubo Du, Jack Lo, Kristof Denolf, Stephen Neuendorffer, Alex Jones, Jingtong Hu, Deming Chen, Jason Cong, Peipei Zhou'
    venue:
      en: "FPGA '23 - The 2023 ACM/SIGDA International Symposium on Field Programmable Gate Arrays"
      cn: "FPGA '23（现场可编程门阵列国际研讨会）"
    cvYear: "2023"
    abstract:
      en: "We propose CHARM, a framework for composing heterogeneous matrix multiply (MM) accelerators to optimize deep learning throughput on platforms like the AMD/Xilinx Versal ACAP. While monolithic accelerators struggle with the small, diverse MM layers found in models like BERT—often achieving less than 5% peak performance—CHARM utilizes analytical models to partition resources and schedule layers across multiple concurrent, specialized architectures. By automating code generation and design space exploration, CHARM achieves up to 32.5x throughput gains over monolithic designs across BERT, ViT, NCF, and MLP benchmarks."
      cn: "本文提出 CHARM 框架，用于在 AMD/Xilinx Versal ACAP 等平台上组合异构矩阵乘法（MM）加速器，以提升深度学习吞吐性能。单体加速器难以高效处理 BERT 等模型中大量规模较小且形态多样的 MM 层，实际性能往往不足峰值的 5%。CHARM 利用分析模型在多种并发的专用架构之间划分资源并调度层执行，并通过自动代码生成与设计空间探索，在 BERT、ViT、NCF 与 MLP 基准上实现最高 32.5 倍吞吐提升。"
    badges:
      - en: "Cited 50+ times"
        cn: "引用 50+ 次"
  - pdf: "research-papers/10.1145-3530775.pdf"
    titleStart:
      en: "FPGA HLS Today: Successes, Challenges, and"
      cn: "当今 FPGA 高层次综合：成就、挑战与"
    titleEnd:
      en: "Opportunities"
      cn: "机遇"
    authors: 'Jason Cong, <span class="font-bold text-black">Jason Lau</span>, Gai Liu, Stephen Neuendorffer, Peichen Pan, Kees Vissers, Zhiru Zhang'
    venue:
      en: 'TRETS ''22 - ACM Transactions on Reconfigurable Technology and Systems, Volume 15, Issue 4, Article No. 51<span class="pub-pages">, Pages 1 - 4</span>'
      cn: 'TRETS ''22（ACM 可重构技术与系统汇刊），第 15 卷第 4 期，第 51 篇<span class="pub-pages">，第 1 - 4 页</span>'
    year: "2022"
    abstract:
      en: "We evaluate the decade-long evolution of FPGA HLS from prototype to industrial deployment across domains like deep learning and genomics. While highlighting HLS successes, we identify critical bottlenecks in clock frequency, system integration, and code legacy, proposing a roadmap for future research centered on open-source infrastructures and standardization."
      cn: "本文回顾了 FPGA 高层次综合在过去十年中从原型验证走向工业部署的发展历程，覆盖深度学习、基因组学等多个应用领域。在总结高层次综合成功经验的同时，我们指出其在时钟频率、系统集成以及代码遗留方面的关键瓶颈，并提出了以后续开放基础设施与标准化为核心的研究路线图。"
    badges:
      - en: "Cited 250+ times"
        cn: "引用 250+ 次"
  - pdf: "research-papers/10.1145-3490422.3502357.pdf"
    titleStart:
      en: "Sextans: A Streaming Accelerator for General-Purpose Sparse-Matrix Dense-Matrix"
      cn: "Sextans：面向通用稀疏矩阵与稠密矩阵"
    titleEnd:
      en: "Multiplication"
      cn: "乘法"
    authors: 'Linghao Song, Yuze Chi, Atefeh Sohrabizadeh, Young-kyu Choi, <span class="font-bold text-black">Jason Lau</span>, Jason Cong'
    venue:
      en: "FPGA '22 - The 2022 ACM/SIGDA International Symposium on Field-Programmable Gate Arrays"
      cn: "FPGA '22（现场可编程门阵列国际研讨会）"
    cvYear: "2022"
    abstract:
      en: "We present Sextans, a flexible FPGA accelerator for general-purpose SpMM that addresses challenges in random memory access, data movement, and workload balancing. By leveraging HBM and PE-aware scheduling, Sextans enables streaming access and balanced pipelining for arbitrary matrix sizes. Evaluation on 1,400 benchmarks shows that Sextans achieves up to a 2.50x speedup over K80 GPUs, with projected optimizations outperforming V100 GPUs."
      cn: "本文提出 Sextans，一种面向通用稀疏矩阵与稠密矩阵乘法（SpMM）的灵活 FPGA 加速器，用于解决随机访存、数据搬运与负载均衡等挑战。通过利用 HBM 与面向处理单元的调度机制，Sextans 能够针对任意矩阵规模实现流式访问与均衡流水。在 1400 个基准上的评估表明，Sextans 相较 K80 GPU 可实现最高 2.50 倍加速，经进一步优化后性能预计可超过 V100 GPU。"
    badges:
      - en: "Cited 100+ times"
        cn: "引用 100+ 次"
  - pdf: "research-papers/10.1109-TCAD.2022.3216544.pdf"
    titleStart:
      en: "TARO: Automatic Optimization for Free-Running Kernels in FPGA High-Level"
      cn: "TARO：面向 FPGA 高层次综合中无阻塞内核的自动"
    titleEnd:
      en: "Synthesis"
      cn: "优化"
    authors: 'Young-kyu Choi, Yuze Chi, <span class="font-bold text-black">Jason Lau</span>, Jason Cong'
    venue:
      en: "TCAD '22 - IEEE Transactions on Computer-Aided Design of Integrated Circuits and Systems"
      cn: "TCAD '22（IEEE 集成电路与系统计算机辅助设计汇刊）"
    cvYear: "2022"
    abstract:
      en: "We present TARO, an automated framework for applying free-running optimization to HLS-based streaming applications. By regulating tasks via data streams rather than complex global control, TARO simplifies hardware logic while preserving original functionality and performance. On the Alveo U250, TARO achieves an average reduction of 16% in LUTs and 45% in FFs for systolic array designs."
      cn: "本文提出 TARO，一套面向高层次综合流式应用的无阻塞自动优化框架。TARO 以数据流而非复杂的全局控制来调度任务，在保持原有功能与性能的同时显著简化硬件逻辑。在 Alveo U250 平台上的实验表明，TARO 可使脉动阵列设计的 LUT 平均减少 16%，FF 平均减少 45%。"
  - pdf: "research-papers/10.1145-3431920.3439289.pdf"
    titleStart:
      en: "AutoBridge: Coupling Coarse-Grained Floorplanning and Pipelining for High-Frequency HLS Design on Multi-Die"
      cn: "AutoBridge：面向多芯粒 FPGA 高频高层次综合设计的粗粒度布局规划与流水线协同优化"
    titleEnd:
      en: "FPGAs"
      cn: "的自动化框架"
    authors: 'Licheng Guo, Yuze Chi, Jie Wang, <span class="font-bold text-black">Jason Lau</span>, Weikang Qiao, Ecenur Ustun, Zhiru Zhang, Jason Cong'
    venue:
      en: "FPGA '21 - The 2021 ACM/SIGDA International Symposium on Field-Programmable Gate Arrays"
      cn: "FPGA '21（现场可编程门阵列国际研讨会）"
    year: "2021"
    abstract:
      en: "We introduce AutoBridge, an automated framework that closes the frequency gap between HLS-generated and handcrafted RTL designs by integrating coarse-grained floorplanning with pipelining during HLS compilation. By providing global layout awareness, AutoBridge identifies and pipelines long interconnects—particularly die-crossing wires in multi-die FPGAs—while preventing routing congestion. Across 43 configurations, AutoBridge increased average frequency from 147 MHz to 297 MHz (102% improvement) and successfully routed previously unroutable designs with negligible resource overhead and zero throughput loss."
      cn: "本文提出 AutoBridge，一套在高层次综合编译过程中联合粗粒度布局规划与流水线优化的自动化框架，用于缩小高层次综合生成设计与手写 RTL 之间的频率差距。借助全局布局感知能力，AutoBridge 能够识别并流水化长互连，尤其是多芯粒 FPGA 中跨芯粒连线，同时避免路由拥塞。在 43 组配置上的实验表明，AutoBridge 将平均频率从 147 MHz 提升至 297 MHz（提升 102%），并以可忽略的资源开销、零吞吐损失成功完成了此前不可布线设计的实现。"
    badges:
      - en: "Best Paper Award"
        cn: "最佳论文奖"
      - en: "Cited 100+ times"
        cn: "引用 100+ 次"
  - pdf: "research-papers/10.1109-FCCM51124.2021.00032.pdf"
    titleStart:
      en: "TAPA: Extending High-Level Synthesis for Task-Parallel"
      cn: "TAPA：面向任务并行程序的高层次综合"
    titleEnd:
      en: "Programs"
      cn: "扩展"
    authors: 'Yuze Chi, Licheng Guo, <span class="font-bold text-black">Jason Lau</span>, Young-kyu Choi, Jie Wang, Jason Cong'
    venue:
      en: "FCCM '21 - The 29th IEEE Annual International Symposium on Field-Programmable Custom Computing Machines"
      cn: "FCCM '21（现场可编程定制计算机器国际研讨会）"
    cvYear: "2021"
    abstract:
      en: "We present TAPA, an automated HLS framework designed to enhance the productivity of task-parallel FPGA accelerators. While traditional HLS struggles with the complexities of parallel task communication and slow development cycles, TAPA introduces a programmer-friendly C++ interface, unconstrained software simulation, and fast hierarchical code generation. By streamlining the development and verification process, TAPA reduces kernel and host code by 22% and 51% respectively, while accelerating correctness verification by 3.2× and QoR tuning by 6.8×."
      cn: "本文提出 TAPA，一套旨在提升任务并行 FPGA 加速器开发效率的自动化高层次综合框架。针对传统高层次综合在并行任务通信复杂、开发周期漫长等方面的局限，TAPA 提供了更友好的 C++ 编程接口、无约束软件仿真以及快速嵌套代码生成能力。通过简化开发与验证流程，TAPA 分别减少了 22% 的计算内核代码与 51% 的主机端代码，并将正确性验证速度提升 3.2 倍、设计质量（QoR）调优速度提升 6.8 倍。"
    badges:
      - en: "Cited 50+ times"
        cn: "引用 50+ 次"
  - pdf: "research-papers/10.1145-3377811.3380340.pdf"
    titleStart:
      en: "HeteroRefactor: Refactoring for Heterogeneous Computing with"
      cn: "HeteroRefactor：面向异构计算的 FPGA 重构"
    titleEnd:
      en: "FPGA"
      cn: "框架"
    authors: '<span class="underline">{<span class="font-bold text-black">Jason Lau*</span>, Aishwarya Sivaraman*, Qian Zhang*}</span>, Muhammad Ali Gulzar, Jason Cong, Miryung Kim'
    venue:
      en: "ICSE '20 - The ACM/IEEE 42nd International Conference on Software Engineering"
      cn: "ICSE '20（国际软件工程会议）"
    year: "2020"
    abstract:
      en: "We propose HeteroRefactor, an automated refactoring framework that enables HLS for traditionally incompatible C/C++ programs containing recursion and dynamic memory. By monitoring FPGA-specific dynamic invariants—such as variable bitwidths and data structure sizes—HeteroRefactor automatically transforms kernels into synthesizable, resource-optimized hardware while using selective CPU offloading to ensure correctness. On Xilinx FPGAs, HeteroRefactor reduces BRAM usage by up to 83% and improves clock frequency by 42%, eliminating the need for extensive manual code refactoring by hardware experts."
      cn: "本文提出 HeteroRefactor，一套自动化代码重构框架，使包含递归与动态内存等传统上不适用于高层次综合的 C/C++ 程序也能被高效综合。通过监测变量位宽、数据结构规模等 FPGA 特定动态不变量，HeteroRefactor 能够自动将计算内核转换为可综合且资源优化的硬件实现，并借助选择性交由 CPU 执行的机制确保正确性。在 Xilinx FPGA 上，HeteroRefactor 最高可降低 83% 的 BRAM 使用量，并将时钟频率提升 42%，从而避免硬件专家进行大量手工重构。"
  - pdf: "research-papers/10.1109-DAC18072.2020.9218718.pdf"
    titleStart:
      en: "Analysis and Optimization of the Implicit Broadcasts in FPGA HLS to Improve Maximum"
      cn: "面向提升设计频率的 FPGA 高层次综合隐式广播分析与"
    titleEnd:
      en: "Frequency"
      cn: "优化"
    authors: '<span class="underline">{Licheng Guo*, <span class="font-bold text-black">Jason Lau*</span></span>}, Yuze Chi, Jie Wang, Cody Hao Yu, Zhe Chen, Zhiru Zhang, Jason Cong'
    venue:
      en: "DAC '20 - The 2020 57th ACM/IEEE Design Automation Conference"
      cn: "DAC '20（设计自动化会议）"
    cvYear: "2020"
    abstract:
      en: "We present a study on frequency degradation in HLS-generated FPGA designs, identifying broadcast structures—specifically high-fanout data, flow control, and synchronization signals—as the primary bottlenecks. By addressing HLS compiler limitations through broadcast-aware scheduling, synchronization pruning, and skid-buffer integration, our approach improves the maximum frequency of representative benchmarks by 53% on average, with gains exceeding 100 MHz in several cases."
      cn: "本文系统研究了高层次综合生成 FPGA 设计中的频率下降问题，并指出广播结构，尤其是高扇出数据、流控信号与同步信号，是主要瓶颈。通过引入广播感知调度、同步裁剪以及滑移缓冲器集成等方法以弥补高层次综合编译器局限，我们的方法在代表性基准上平均将最高频率提升 53%，部分案例增幅超过 100 MHz。"
    badges:
      - en: "Best Paper Candidate"
        cn: "最佳论文提名"
      - en: "Cited 50+ times"
        cn: "引用 50+ 次"
  - pdf: "research-papers/10.1109-FCCM.2019.00027.pdf"
    titleStart:
      en: "Hardware Acceleration of Long Read Pairwise Overlapping in Genome Sequencing: A Race Between FPGA and"
      cn: "针对基因组测序中长读成对重叠分析的硬件加速：FPGA 与 GPU 的"
    titleEnd:
      en: "GPU"
      cn: "竞赛"
    authors: '<span class="underline">{Licheng Guo*, <span class="font-bold text-black">Jason Lau*</span></span>}, Zhenyuan Ruan, Peng Wei, Jason Cong'
    venue:
      en: "FCCM '19 - The 2019 IEEE 27th Annual International Symposium on Field-Programmable Custom Computing Machines"
      cn: "FCCM '19（现场可编程定制计算机器国际研讨会）"
    year: "2019"
    abstract:
      en: "We present a high-performance acceleration framework for chaining, the primary bottleneck in genome sequencing that accounts for 70% of execution time. By reordering operation sequences for hardware-friendly parallelism and implementing a fine-grained task dispatching scheme, we overcome the limitations of variable input sizes and poor data dependency. Our fully pipelined streaming architecture on FPGA achieves a 28x speedup over the highly-optimized multi-threaded CPU program and 4x over a fully-utilized GPU, providing a quantitative guide for selecting optimal hardware platforms for genomic workloads."
      cn: "本文提出一套面向基因分析链式比对阶段的高性能加速框架，该阶段是基因组测序流程中的核心瓶颈，占总执行时间的 70%。通过对操作序列进行硬件友好的重排，并设计细粒度任务分发机制，我们克服了输入规模变化大与数据依赖关系复杂带来的限制。所提出的 FPGA 全流水流式架构相较高度优化的多线程 CPU 程序实现了 28 倍加速，相较满负载 GPU 实现了 4 倍加速，为基因组工作负载的最佳硬件平台选择提供了量化依据。"
    badges:
      - en: "Cited 100+ times"
        cn: "引用 100+ 次"
  - pdf: "research-papers/10.1016-j.parco.2018.07.002.pdf"
    titleStart:
      en: "Reproducing Vectorization of the Tersoff Multi-Body Potential on the Intel Skylake and NVIDIA Volta"
      cn: "在 Intel Skylake 与 NVIDIA Volta 上复现 Tersoff 多体势的向量化"
    titleEnd:
      en: "Architectures"
      cn: "实现"
    authors: '<span class="font-bold text-black">Jason Lau</span>, Yuxuan Li, Lei Xie, Qian Xie, Beichen Li, Yu Chen, Guanyu Feng, Jiping Yu, Xinjian Yu, Miao Wang, Wentao Han, Jidong Zhai'
    venue:
      en: 'Parallel Computing, Volume 78, October 2018<span class="pub-pages">, Pages 47-53</span>'
      cn: 'Parallel Computing（并行计算），第 78 卷，2018 年 10 月<span class="pub-pages">，第 47 - 53 页</span>'
    year: "2018"
    abstract:
      en: "We present an evaluation of the Tersoff potential's performance portability on Intel Skylake and NVIDIA Volta architectures. While the original study claimed high efficiency and scalability through reduced precision and cross-platform vectorization, our experiments with updated datasets show inconsistent results. Analysis reveals that communication bottlenecks, triggered by specific characteristics of the new input data, significantly limit the reproducibility of the original performance gains."
      cn: "本文评估了 Tersoff 多体势在 Intel Skylake 与 NVIDIA Volta 架构上的性能可移植性。尽管原始研究宣称通过降低精度与跨平台向量化可实现高效率与良好扩展性，但我们基于更新数据集的实验结果并不一致。进一步分析表明，新输入数据的特定特征引发了通信瓶颈，从而显著限制了原有性能收益的可复现性。"

# --- Developer page ---
projects:
  - title: "TAPA: Task-Parallel FPGA Compiler"
    role:
      en: "Maintainer and Co-Author"
      cn: "维护者与共同作者"
    desc:
      en: "In collaboration with lab members at UCLA, implemented TAPA, a task-parallel FPGA compiler based on Clang that enables high-level programming of FPGAs using C++ dataflow graph. Extended the compiler with nested tasks supporting complex applications. Implemented with lab members a high-performance parallel RTL co-simulation framework, allowing real-world application mixing HLS and RTL designs. Extended a high-level synthesis tool, AutoSA, to generate TAPA programs that provide higher performance than Vitis HLS."
      cn: "与加州大学洛杉矶分校实验室成员合作实现了基于 Clang 的任务并行 FPGA 编译器 TAPA，使开发者能够以 C++ 数据流图形式对 FPGA 进行高层编程。扩展了编译器的嵌套任务能力以支持复杂应用；与团队共同实现高性能并行 RTL 协同仿真框架，使真实应用可以混合使用高层次综合与 RTL 设计；同时扩展了高层次综合工具 AutoSA，使其生成性能优于 Vitis HLS 的 TAPA 应用。"
  - title: "HeteroRefactor: Source-to-Source Code Refactoring"
    role:
      en: "Automated Code Refactoring Developer"
      cn: "自动化代码重构开发者"
    desc:
      en: "Developed HeteroRefactor, a ROSE-based source-to-source code refactoring tool that automatically transforms C++ code to use heterogeneous programming models, so that the code's recursion, pointers and dynamic memory allocation are translated to vendor tool supported equivalents."
      cn: "开发了基于 ROSE 的源到源代码重构工具 HeteroRefactor，可自动将 C++ 代码转换为异构编程模型，使递归、指针与动态内存分配等特性被重写为厂商工具可支持的等价实现。"
  - title: "TUNA Open Source Mirror Site"
    role:
      en: "Maintainer and Organizational Chair"
      cn: "维护者与组织负责人"
    desc:
      en: "Maintained the largest open-source mirror site in China (mirrors.tuna.tsinghua.edu.cn). Built a high-performance, reliable multi-server system with fast data storage, serving an average throughput of 3.1 Gbps used by users across China."
      cn: "维护中国最大的开源软件镜像站之一（mirrors.tuna.tsinghua.edu.cn）。构建了具备高速存储能力的高性能、高可靠多服务器系统，平均吞吐达到 3.1 Gbps，服务全国用户。"
  - title: "NGINXwise: RL-based Congestion Control"
    role:
      en: "Network Software Developer"
      cn: "网络软件开发者"
    desc:
      en: "Built a production-ready NGINX-based testbed for evaluating reinforcement learning for optimizing the initial congestion control window (CWND). The testbed is used in measuring HTTP request latency on live traffic of a top Chinese website."
      cn: "构建了可用于生产环境的 NGINX 测试平台，用于评估基于强化学习的初始拥塞窗口（CWND）优化方法。该平台被用于中国头部网站真实流量场景下的 HTTP 请求时延测量。"
  - title: "MPIfuse: Distributed File System"
    role:
      en: "Computer System Researcher"
      cn: "计算机系统研究者"
    desc:
      en: "In collaboration with team members, developed a high-performance distributed file system prototype using MPI and FUSE. Identified bottlenecks in FUSE and achieved 3.6 GB/s parallel write speeds on an 8-machine cluster, outperforming NFS on tmpfs."
      cn: "与团队成员合作，基于 MPI 与 FUSE 开发了高性能分布式文件系统原型。识别并解决了 FUSE 的关键瓶颈，在 8 台机器组成的集群上实现 3.6 GB/s 的并行写入速度，性能优于运行在 tmpfs 上的 NFS。"
  - title: "CachedMIPS: FPGA-Based Processor"
    role:
      en: "Hardware Design Engineer"
      cn: "硬件设计工程师"
    desc:
      en: "Developed a pipelined write-back L1 cache with AHB protocol for a MIPS32r1 compatible CPU on Xilinx FPGA. Improved interrupt logic and peripheral support to enable full Linux booting in 8.4 seconds, achieving a 50x speedup on general applications."
      cn: "在 Xilinx FPGA 上为兼容 MIPS32r1 的 CPU 开发了带 AHB 协议的流水化写回式 L1 Cache，并改进中断逻辑与外设支持，使系统可在 8.4 秒内完整启动 Linux，在通用应用上实现 50 倍性能提升。"
  - title: "Cherry: Cluster Management System"
    role:
      en: "Full Stack Developer"
      cn: "全栈开发者"
    desc:
      en: "Developed a network management system for a cluster used by a Chinese backbone network. Implemented deployment configuration (Puppet), resource management (virtualization, bandwidth), and metrics monitoring using Node.js, Redis, and Nagios."
      cn: "为中国骨干网络使用的集群开发了网络管理系统，涵盖部署配置（Puppet）、资源管理（虚拟化、带宽）以及基于 Node.js、Redis 与 Nagios 的指标监控能力。"
  - title: "iTunet: Automated Network Configuration"
    role:
      en: "iOS Developer"
      cn: "iOS 开发者"
    desc:
      en: "Developed an iOS widget application that automatically configures settings for the Tsinghua University campus network. The app simplifies the process of connecting to the university's network by automating the connection setup, making the login process transparent on disconnections."
      cn: "开发了可自动配置清华大学校园网连接参数的 iOS 小组件应用。该应用通过自动完成连接设置，显著简化校园网接入流程，并在断线重连时尽可能实现无感登录。"
  - title: "Iodine: Online Program Judge System"
    role:
      en: "Full Stack Developer"
      cn: "全栈开发者"
    desc:
      en: "In collaboration with the HUSTOJ author, developed an online judge system for programming competitions. Refactored the code to support modern web standards, including a new frontend using Bootstrap and a backend with Laravel PHP. The grading is isolated in Docker containers, allowing for secure and efficient execution of user-submitted code."
      cn: "与 HUSTOJ 作者合作开发了面向程序设计竞赛的在线评测系统。对原有代码进行现代化重构，包括基于 Bootstrap 的新前端与基于 Laravel PHP 的后端；评测执行则隔离在 Docker 容器中，以确保用户提交代码的安全与高效运行。"

