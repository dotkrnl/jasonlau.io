# Publications use `year` for the web (shown per year group) and `cvYear` as a
# fallback for the CV only (every paper gets a year). If `year` is present it is
# used on both web and CV; if only `cvYear` is set, the web shows no year label.
publications:
  - pdf: "research-papers/10.1109-ICCAD66269.2025.11240757.pdf"
    titleStart: "Automated Design Space Exploration in High-Level Physical"
    titleEnd: "Synthesis"
    authors: 'Linfeng Du, Jiawei Liang, <span class="font-bold text-black">Jason Lau</span>, Yuze Chi, Yutong Xie, Chunyou Su, Afzal Ahmad, Zifan He, Jake Ke, Jinming Ge, Jason Cong, Wei Zhang, Licheng Guo'
    venue: "ICCAD '25 - The 2025 IEEE/ACM International Conference On Computer Aided Design"
    year: "2025"
    abstract: "We propose a robust Design Space Exploration (DSE) framework to address the instability and manual complexity of existing High-Level Physical Synthesis (HLPS) for multi-die FPGAs. By automating iterative parameter tuning through physical implementation metrics and tailored heuristics, our framework ensures consistent timing closure and eliminates user intervention. In evaluations on large-scale designs, the framework achieved an average frequency of 311.06 MHz, outperforming the AMD Vitis/Vivado toolchain by 2.42× and leading academic solutions by 1.67×."
  - pdf: "research-papers/10.1145-3676536.3676649.pdf"
    titleStart: "RapidStream IR: Infrastructure for FPGA High-Level Physical"
    titleEnd: "Synthesis"
    authors: '<span class="font-bold text-black">Jason Lau</span>, Yuanlong Xiao, Yutong Xie, Yuze Chi, Linghao Song, Shaojie Xiang, Michael Lo, Zhiru Zhang, Jason Cong, Licheng Guo'
    venue: "ICCAD '24 - The 43rd IEEE/ACM International Conference on Computer-Aided Design"
    year: "2024"
    abstract: "We present the concept of high-level physical synthesis (HLPS), and a practical infrastructure for representing the composition of complex FPGA designs and exploring physical optimizations. Our approach introduces a flexible intermediate representation that captures interconnection protocols at arbitrary hierarchical levels, coarse-grained pipelining, and spatial information, enabling the creation of reusable passes for design frequency optimizations. RapidStream IR improves the frequency of a broad set of mixed-source designs by 7% to 62%."
  - pdf: "research-papers/10.1145-3686163.pdf"
    titleStart: "CHARM 2.0: Composing Heterogeneous Accelerators for Deep Learning on Versal ACAP"
    titleEnd: "Architecture"
    authors: 'Jinming Zhuang, <span class="font-bold text-black">Jason Lau</span>, Hanchen Ye, Zhuoping Yang, Shixin Ji, Jack Lo, Kristof Denolf, Stephen Neuendorffer, Alex Jones, Jingtong Hu, Yiyu Shi, Deming Chen, Jason Cong, Peipei Zhou'
    venue: 'TRETS ''24 - ACM Transactions on Reconfigurable Technology and Systems, Volume 17, Issue 3, Article No. 51<span class="pub-pages">, Pages 1 - 31</span>'
    cvYear: "2024"
    abstract: "We propose CHARM, a framework designed to optimize throughput for end-to-end deep learning applications on the AMD/Xilinx Versal ACAP. To overcome the performance bottlenecks caused by executing small matrix multiply (MM) layers on monolithic accelerators, CHARM composes multiple diverse, concurrent accelerator architectures tailored to varied layer sizes. By utilizing analytical models for design space exploration and automated code generation, CHARM achieves throughput gains of up to 32.51x over monolithic designs across models like BERT and ViT."
  - pdf: "research-papers/thesis.pdf"
    titleStart: "Enabling Heterogeneous Computing for Software"
    titleEnd: "Developers"
    authors: '<span class="font-bold text-black">Jason Lau</span> advised by Jason Cong'
    venue: "Ph.D. Dissertation, University of California, Los Angeles"
    cvYear: "2024"
    abstract: "We introduce Heterosys, an end-to-end framework designed to bridge the gap between high-level software and efficient FPGA implementation. By decoupling algorithmic descriptions from underlying hardware, Heterosys utilizes three core components—HeteroRefactor for automated refactoring and selective offloading, Adroit for frequency-driven architectural optimization, and RapidIR for high-level physical synthesis and floorplanning. Our research demonstrates frequency improvements of 30% to over 100%, resource reductions up to 90%, and a 51% decrease in manual code effort, significantly lowering the barrier to entry for heterogeneous computing."
  - pdf: "research-papers/10.1145-3609335.pdf"
    titleStart: "TAPA: A Scalable Task-Parallel Dataflow Programming Framework for Modern FPGAs with Co-Optimization of HLS and Physical"
    titleEnd: "Design"
    authors: '<span class="underline">{Licheng Guo*, Yuze Chi*, <span class="font-bold text-black">Jason Lau*</span>}</span>, Linghao Song, Xingyu Tian, Moazin Khatti, Weikang Qiao, Jie Wang, Ecenur Ustun, Zhenman Fang, Zhiru Zhang, Jason Cong'
    venue: 'TRETS ''23 - ACM Transactions on Reconfigurable Technology and Systems, Volume 16, Issue 4, Article No. 63<span class="pub-pages">, Pages 1 - 31</span>'
    year: "2023"
    abstract: "We propose TAPA, an end-to-end framework for compiling C++ task-parallel programs into high-frequency FPGA accelerators. By utilizing flexible communication APIs and coarse-grained floorplanning during compilation, TAPA enables accurate pipelining of critical paths and optimizes designs for HBM-based FPGAs. Experimental results across 43 designs demonstrate a 102% average frequency improvement, including successful implementation of previously unroutable designs with minimal resource impact."
    badges:
      - "Cited 50+ times"
  - pdf: "research-papers/10.1145-3593025.pdf"
    titleStart: "RapidStream 2.0: Automated Parallel Implementation of Latency–Insensitive FPGA Designs Through Partial"
    titleEnd: "Reconfiguration"
    authors: 'Licheng Guo, Pongstorn Maidee, Yun Zhou, Chris Lavin, Eddie Hung, Wuxi Li, <span class="font-bold text-black">Jason Lau</span>, Weikang Qiao, Yuze Chi, Linghao Song, Yuanlong Xiao, Alireza Kaviani, Zhiru Zhang, Jason Cong'
    venue: 'TRETS ''23 - ACM Transactions on Reconfigurable Technology and Systems, Volume 16, Issue 4, Article No. 59<span class="pub-pages">, Pages 1 - 30</span>'
    cvYear: "2023"
    abstract: "We present RapidStream, a parallelized, physical-integrated compilation framework designed to drastically reduce FPGA compilation cycles. By co-optimizing HLS with back-end physical implementation, RapidStream partitions latency-insensitive C/C++ programs for parallel placement and routing. RapidStream achieves a 5–7× reduction in compile time and up to a 1.3× increase in frequency compared to commercial toolchains."
  - pdf: "research-papers/10.1145-3543622.3573210.pdf"
    titleStart: "CHARM: Composing Heterogeneous Accelerators for Matrix Multiply on Versal ACAP"
    titleEnd: "Architecture"
    authors: 'Jinming Zhuang, <span class="font-bold text-black">Jason Lau</span>, Hanchen Ye, Zhuoping Yang, Yubo Du, Jack Lo, Kristof Denolf, Stephen Neuendorffer, Alex Jones, Jingtong Hu, Deming Chen, Jason Cong, Peipei Zhou'
    venue: "FPGA '23 - The 2023 ACM/SIGDA International Symposium on Field Programmable Gate Arrays"
    cvYear: "2023"
    abstract: "We propose CHARM, a framework for composing heterogeneous matrix multiply (MM) accelerators to optimize deep learning throughput on platforms like the AMD/Xilinx Versal ACAP. While monolithic accelerators struggle with the small, diverse MM layers found in models like BERT—often achieving less than 5% peak performance—CHARM utilizes analytical models to partition resources and schedule layers across multiple concurrent, specialized architectures. By automating code generation and design space exploration, CHARM achieves up to 32.5x throughput gains over monolithic designs across BERT, ViT, NCF, and MLP benchmarks."
    badges:
      - "Cited 50+ times"
  - pdf: "research-papers/10.1145-3530775.pdf"
    titleStart: "FPGA HLS Today: Successes, Challenges, and"
    titleEnd: "Opportunities"
    authors: 'Jason Cong, <span class="font-bold text-black">Jason Lau</span>, Gai Liu, Stephen Neuendorffer, Peichen Pan, Kees Vissers, Zhiru Zhang'
    venue: 'TRETS ''22 - ACM Transactions on Reconfigurable Technology and Systems, Volume 15, Issue 4, Article No. 51<span class="pub-pages">, Pages 1 - 4</span>'
    year: "2022"
    abstract: "We evaluate the decade-long evolution of FPGA HLS from prototype to industrial deployment across domains like deep learning and genomics. While highlighting HLS successes, we identify critical bottlenecks in clock frequency, system integration, and code legacy, proposing a roadmap for future research centered on open-source infrastructures and standardization."
    badges:
      - "Cited 200+ times"
  - pdf: "research-papers/10.1145-3490422.3502357.pdf"
    titleStart: "Sextans: A Streaming Accelerator for General-Purpose Sparse-Matrix Dense-Matrix"
    titleEnd: "Multiplication"
    authors: 'Linghao Song, Yuze Chi, Atefeh Sohrabizadeh, Young-kyu Choi, <span class="font-bold text-black">Jason Lau</span>, Jason Cong'
    venue: "FPGA '22 - The 2022 ACM/SIGDA International Symposium on Field-Programmable Gate Arrays"
    cvYear: "2022"
    abstract: "We present Sextans, a flexible FPGA accelerator for general-purpose SpMM that addresses challenges in random memory access, data movement, and workload balancing. By leveraging HBM and PE-aware scheduling, Sextans enables streaming access and balanced pipelining for arbitrary matrix sizes. Evaluation on 1,400 benchmarks shows that Sextans achieves up to a 2.50x speedup over K80 GPUs, with projected optimizations outperforming V100 GPUs."
    badges:
      - "Cited 100+ times"
  - pdf: "research-papers/10.1109-TCAD.2022.3216544.pdf"
    titleStart: "TARO: Automatic Optimization for Free-Running Kernels in FPGA High-Level"
    titleEnd: "Synthesis"
    authors: 'Young-kyu Choi, Yuze Chi, <span class="font-bold text-black">Jason Lau</span>, Jason Cong'
    venue: "TCAD '22 - IEEE Transactions on Computer-Aided Design of Integrated Circuits and Systems"
    cvYear: "2022"
    abstract: "We present TARO, an automated framework for applying free-running optimization to HLS-based streaming applications. By regulating tasks via data streams rather than complex global control, TARO simplifies hardware logic while preserving original functionality and performance. On the Alveo U250, TARO achieves an average reduction of 16% in LUTs and 45% in FFs for systolic array designs."
  - pdf: "research-papers/10.1145-3431920.3439289.pdf"
    titleStart: "AutoBridge: Coupling Coarse-Grained Floorplanning and Pipelining for High-Frequency HLS Design on Multi-Die"
    titleEnd: "FPGAs"
    authors: 'Licheng Guo, Yuze Chi, Jie Wang, <span class="font-bold text-black">Jason Lau</span>, Weikang Qiao, Ecenur Ustun, Zhiru Zhang, Jason Cong'
    venue: "FPGA '21 - The 2021 ACM/SIGDA International Symposium on Field-Programmable Gate Arrays"
    year: "2021"
    abstract: "We introduce AutoBridge, an automated framework that closes the frequency gap between HLS-generated and handcrafted RTL designs by integrating coarse-grained floorplanning with pipelining during HLS compilation. By providing global layout awareness, AutoBridge identifies and pipelines long interconnects—particularly die-crossing wires in multi-die FPGAs—while preventing routing congestion. Across 43 configurations, AutoBridge increased average frequency from 147 MHz to 297 MHz (102% improvement) and successfully routed previously unroutable designs with negligible resource overhead and zero throughput loss."
    badges:
      - "Best Paper Award"
      - "Cited 100+ times"
  - pdf: "research-papers/10.1109-FCCM51124.2021.00032.pdf"
    titleStart: "TAPA: Extending High-Level Synthesis for Task-Parallel"
    titleEnd: "Programs"
    authors: 'Yuze Chi, Licheng Guo, <span class="font-bold text-black">Jason Lau</span>, Young-kyu Choi, Jie Wang, Jason Cong'
    venue: "FCCM '21 - The 29th IEEE Annual International Symposium on Field-Programmable Custom Computing Machines"
    cvYear: "2021"
    abstract: "We present TAPA, an automated HLS framework designed to enhance the productivity of task-parallel FPGA accelerators. While traditional HLS struggles with the complexities of parallel task communication and slow development cycles, TAPA introduces a programmer-friendly C++ interface, unconstrained software simulation, and fast hierarchical code generation. By streamlining the development and verification process, TAPA reduces kernel and host code by 22% and 51% respectively, while accelerating correctness verification by 3.2× and QoR tuning by 6.8×."
    badges:
      - "Cited 50+ times"
  - pdf: "research-papers/10.1145-3377811.3380340.pdf"
    titleStart: "HeteroRefactor: Refactoring for Heterogeneous Computing with"
    titleEnd: "FPGA"
    authors: '<span class="underline">{<span class="font-bold text-black">Jason Lau*</span>, Aishwarya Sivaraman*, Qian Zhang*}</span>, Muhammad Ali Gulzar, Jason Cong, Miryung Kim'
    venue: "ICSE '20 - The ACM/IEEE 42nd International Conference on Software Engineering"
    year: "2020"
    abstract: "We propose HeteroRefactor, an automated refactoring framework that enables HLS for traditionally incompatible C/C++ programs containing recursion and dynamic memory. By monitoring FPGA-specific dynamic invariants—such as variable bitwidths and data structure sizes—HeteroRefactor automatically transforms kernels into synthesizable, resource-optimized hardware while using selective CPU offloading to ensure correctness. On Xilinx FPGAs, HeteroRefactor reduces BRAM usage by up to 83% and improves clock frequency by 42%, eliminating the need for extensive manual code refactoring by hardware experts."
  - pdf: "research-papers/10.1109-DAC18072.2020.9218718.pdf"
    titleStart: "Analysis and Optimization of the Implicit Broadcasts in FPGA HLS to Improve Maximum"
    titleEnd: "Frequency"
    authors: '<span class="underline">{Licheng Guo*, <span class="font-bold text-black">Jason Lau*</span></span>}, Yuze Chi, Jie Wang, Cody Hao Yu, Zhe Chen, Zhiru Zhang, Jason Cong'
    venue: "DAC '20 - The 2020 57th ACM/IEEE Design Automation Conference"
    cvYear: "2020"
    abstract: "We present a study on frequency degradation in HLS-generated FPGA designs, identifying broadcast structures—specifically high-fanout data, flow control, and synchronization signals—as the primary bottlenecks. By addressing HLS compiler limitations through broadcast-aware scheduling, synchronization pruning, and skid-buffer integration, our approach improves the maximum frequency of representative benchmarks by 53% on average, with gains exceeding 100 MHz in several cases."
    badges:
      - "Best Paper Candidate"
      - "Cited 50+ times"
  - pdf: "research-papers/10.1109-FCCM.2019.00027.pdf"
    titleStart: "Hardware Acceleration of Long Read Pairwise Overlapping in Genome"
    titleEnd: "Sequencing"
    authors: '<span class="underline">{Licheng Guo*, <span class="font-bold text-black">Jason Lau*</span></span>}, Zhenyuan Ruan, Peng Wei, Jason Cong'
    venue: "FCCM '19 - The 2019 IEEE 27th Annual International Symposium on Field-Programmable Custom Computing Machines"
    year: "2019"
    abstract: "We present a high-performance acceleration framework for chaining, the primary bottleneck in genome sequencing that accounts for 70% of execution time. By reordering operation sequences for hardware-friendly parallelism and implementing a fine-grained task dispatching scheme, we overcome the limitations of variable input sizes and poor data dependency. Our fully pipelined streaming architecture on FPGA achieves a 28x speedup over the highly-optimized multi-threaded CPU program and 4x over a fully-utilized GPU, providing a quantitative guide for selecting optimal hardware platforms for genomic workloads."
    badges:
      - "Cited 100+ times"
  - pdf: "research-papers/10.1016-j.parco.2018.07.002.pdf"
    titleStart: "Reproducing Vectorization of the Tersoff Multi-Body Potential on the Intel Skylake and NVIDIA Volta"
    titleEnd: "Architectures"
    authors: '<span class="font-bold text-black">Jason Lau</span>, Yuxuan Li, Lei Xie, Qian Xie, Beichen Li, Yu Chen, Guanyu Feng, Jiping Yu, Xinjian Yu, Miao Wang, Wentao Han, Jidong Zhai'
    venue: 'Parallel Computing, Volume 78, October 2018<span class="pub-pages">, Pages 47-53</span>'
    year: "2018"
    abstract: "We present an evaluation of the Tersoff potential's performance portability on Intel Skylake and NVIDIA Volta architectures. While the original study claimed high efficiency and scalability through reduced precision and cross-platform vectorization, our experiments with updated datasets show inconsistent results. Analysis reveals that communication bottlenecks, triggered by specific characteristics of the new input data, significantly limit the reproducibility of the original performance gains."

# --- Developer page ---
projects:
  - title: "TAPA: Task-Parallel FPGA Compiler"
    role: "Maintainer and Co-Author"
    desc: "In collaboration with lab members at UCLA, implemented TAPA, a task-parallel FPGA compiler based on Clang that enables high-level programming of FPGAs using C++ dataflow graph. Extended the compiler with nested tasks supporting complex applications. Implemented with lab members a high-performance parallel RTL co-simulation framework, allowing real-world application mixing HLS and RTL designs. Extended a high-level synthesis tool, AutoSA, to generate TAPA programs that provide higher performance than Vitis HLS."
  - title: "HeteroRefactor: Source-to-Source Code Refactoring"
    role: "Automated Code Refactoring Developer"
    desc: "Developed HeteroRefactor, a ROSE-based source-to-source code refactoring tool that automatically transforms C++ code to use heterogeneous programming models, so that the code's recursion, pointers and dynamic memory allocation are translated to vendor tool supported equivalents."
  - title: "TUNA Open Source Mirror Site"
    role: "Maintainer and Organizational Chair"
    desc: "Maintained the largest open-source mirror site in China (mirrors.tuna.tsinghua.edu.cn). Built a high-performance, reliable multi-server system with fast data storage, serving an average throughput of 3.1 Gbps used by users across China."
  - title: "NGINXwise: RL-based Congestion Control"
    role: "Network Software Developer"
    desc: "Built a production-ready NGINX-based testbed for evaluating reinforcement learning for optimizing the initial congestion control window (CWND). The testbed is used in measuring HTTP request latency on live traffic of a top Chinese website."
  - title: "MPIfuse: Distributed File System"
    role: "Computer System Researcher"
    desc: "In collaboration with team members, developed a high-performance distributed file system prototype using MPI and FUSE. Identified bottlenecks in FUSE and achieved 3.6 GB/s parallel write speeds on an 8-machine cluster, outperforming NFS on tmpfs."
  - title: "CachedMIPS: FPGA-Based Processor"
    role: "Hardware Design Engineer"
    desc: "Developed a pipelined write-back L1 cache with AHB protocol for a MIPS32r1 compatible CPU on Xilinx FPGA. Improved interrupt logic and peripheral support to enable full Linux booting in 8.4 seconds, achieving a 50x speedup on general applications."
  - title: "Cherry: Cluster Management System"
    role: "Full Stack Developer"
    desc: "Developed a network management system for a cluster used by a Chinese backbone network. Implemented deployment configuration (Puppet), resource management (virtualization, bandwidth), and metrics monitoring using Node.js, Redis, and Nagios."
  - title: "iTunet: Automated Network Configuration"
    role: "iOS Developer"
    desc: "Developed an iOS widget application that automatically configures settings for the Tsinghua University campus network. The app simplifies the process of connecting to the university's network by automating the connection setup, making the login process transparent on disconnections."
  - title: "Iodine: Online Program Judge System"
    role: "Full Stack Developer"
    desc: "In collaboration with the HUSTOJ author, developed an online judge system for programming competitions. Refactored the code to support modern web standards, including a new frontend using Bootstrap and a backend with Laravel PHP. The grading is isolated in Docker containers, allowing for secure and efficient execution of user-submitted code."

