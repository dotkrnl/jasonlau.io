          en: "Icons designed for Tsinghua University TUNA association."
          cn: "为清华大学 TUNA 协会设计的一组图标。"
        alt:
          en: "Icons designed for TUNA association, featuring the icon for the mirror site, DNS service, NTP service, and the danmaku service."
          cn: "为 TUNA 协会设计的图标，包括镜像站、DNS 服务、NTP 服务与弹幕服务等。"
      pikaLogo:
