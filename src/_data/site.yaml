experience:
  - title:
      en: "Hardware Engineer"
      cn: "硬件工程师"
    org: "Jump Trading Group"
    time:
      en: "2025 – Present"
      cn: "2025 – 至今"
    desc:
      en: "Research in high-level synthesis algorithms and high-performance designs for high-frequency trading."
      cn: "从事面向高频交易的高层次综合算法与高性能硬件设计研究。"
    researcher: true
    developer:
      time:
        en: "Aug 2025 – Present"
        cn: "2025 年 8 月 – 至今"
      desc:
        en: "Researching and developing high-level synthesis algorithms for high-frequency trading, and creating high-performance FPGA and ARM hardware accelerators based on the developed toolchain. Developing low-latency hardware logic and integration for modern multi-die FPGAs to optimize trading performance."
        cn: "负责研究与开发面向高频交易的高层次综合算法，并基于所开发工具链构建高性能 FPGA 与 ARM 硬件加速器。同时面向现代多芯粒 FPGA 研发超低时延硬件逻辑与系统集成方案，以优化交易性能。"
      location: "Sunnyvale, CA"
    cv: true
  - title:
      en: "CTO & Co-Founder"
      cn: "首席技术官兼联合创始人"
    org:
      en: "RapidStream Design Automation (Acquired)"
      cn: "RapidStream（已被收购）"
    time:
      en: "2023 – 2025"
      cn: "2023 – 2025"
    desc:
      en: "Developed compiler solutions for low-latency FPGA accelerators. Led research enabling efficient high-level physical designs from software specifications."
      cn: "主导面向低时延 FPGA 加速器的编译器解决方案研发，并推动从软件规格高效生成高层次物理设计的关键研究。"
    researcher: true
    developer:
      title:
        en: "Chief Technology Officer & Co-Founder"
        cn: "首席技术官兼联合创始人"
      org:
        en: "RapidStream Design Automation (Acquired by a Leading Global HFT Firm)"
        cn: "RapidStream Design Automation（被全球领先高频交易公司收购）"
      time:
        en: "Jan 2023 – Aug 2025"
        cn: "2023 年 1 月 – 2025 年 8 月"
      desc:
        en: "Devise the technical strategy and development of compiler solutions that deliver low-latency, high-performance FPGA accelerators. Engineered systems enabling efficient high-level physical designs directly from software specifications, significantly reducing compilation cycles."
        cn: "负责制定技术战略并推进编译器产品研发，以交付低时延、高性能 FPGA 加速器。构建可直接由软件规格生成高层次物理设计的系统，大幅缩短编译迭代周期。"
      location: "Sunnyvale, CA"
    cv: true
  - title:
      en: "Compilation Researcher"
      cn: "编译研究员"
    org:
      en: "AMD Xilinx"
      cn: "AMD 赛灵思"
    time:
      en: "2022 (Intern)"
      cn: "2022（实习）"
    desc:
      en: "Researched and designed a physical layout aware MLIR flow for AMD Versal devices."
      cn: "研究并设计了面向 AMD Versal 器件、具备物理布局感知能力的 MLIR 编译流程。"
    researcher: true
    developer:
      title:
        en: "Compilation Researcher (Intern)"
        cn: "编译研究员（实习）"
      org:
        en: "Advanced Micro Devices (AMD), Xilinx"
        cn: "超威半导体（AMD）、赛灵思（Xilinx）"
      time:
        en: "Jun 2022 – Sep 2022"
        cn: "2022 年 6 月 – 2022 年 9 月"
      desc:
        en: "Researched and implemented an MLIR compiler that is hardware physical aware for AMD Versal devices, targeting the AI Engine array. Designed flows enabling high-performance application acceleration on next-generation SoCs."
        cn: "研究并实现了面向 AMD Versal 器件、针对 AI Engine 阵列的物理感知 MLIR 编译器，并设计了支持下一代系统级芯片（SoC）高性能应用加速的编译流程。"
      location: "Longmont, CO"
    cv: true
  - title:
      en: "Doctoral Researcher"
      cn: "博士研究员"
    org:
      en: "UCLA VAST Lab"
      cn: "加州大学洛杉矶分校 VAST 实验室"
    time:
      en: "2018 – 2022"
      cn: "2018 – 2022"
    desc:
      en: "Developed methodologies and tools for high-level synthesis, enabling efficient hardware acceleration for software developers. Focused on lowering barriers to entry for FPGA programming."
      cn: "开发高层次综合相关方法与工具，使软件开发者能够更高效地构建硬件加速方案，重点降低 FPGA 编程门槛。"
    researcher: true
  - title:
      en: "Cloud Software Engineer (Intern)"
      cn: "云软件工程师（实习）"
    org:
      en: "Google"
      cn: "谷歌"
    time:
      en: "Jun 2016 – Sep 2016"
      cn: "2016 年 6 月 – 2016 年 9 月"
    desc:
      en: 'Created "AwesomeChart," a cloud performance data analytical platform and visualization library capable of rendering millions of time series smoothly. The platform was integrated into Google Cloud Platform and remains in use by customers for monitoring critical metrics.'
      cn: "开发了云性能数据分析平台与可视化库 “AwesomeChart”，可流畅渲染数百万条时间序列。该平台随后集成至谷歌云平台（Google Cloud Platform），至今仍被客户用于关键指标监控。"
    developer:
      location: "Cambridge, MA"
    cv: true

