          cn: "在 AI 时代，你的自我映像是怎么样的？"
        alt:
          en: "Photo showing a person standing in front of a screen, displaying their face in a digital art style."
          cn: "人物站在屏幕前，其面部以数字艺术风格呈现。"
      selfImage:
        caption:
          en: "This is how artists viewed themselves in their works. We averaged their self-portraits. Left: Renaissance, Right: Modern."
          cn: "这是艺术家如何在作品中观看自身的方式。我们对其自画像进行了平均处理。左为文艺复兴时期，右为现代时期。"
        alt:
          en: "Photo showing how artists depict themselves in their works."
          cn: "展示艺术家如何在作品中描绘自身的图像。"
      uploadedImage:
        caption:
          en: "This is how young adults viewed themselves in their portraits. We averaged their photos. Left: On-site capture, Right: Self-uploaded."
          cn: "这是年轻人对自身形象的认知。我们对其照片进行了平均处理。左为现场拍摄，右为自行上传。"
        alt:
          en: "Photo showing how students see themselves by comparing on-site capture and self-uploaded images."
          cn: "通过现场拍摄与自行上传图像对比，展示学生如何看待自身形象。"
      tunaIcons:
